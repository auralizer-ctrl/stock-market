name: Scheduled Market Data Update

on:
  schedule:
    # 매일 한국 시간 오전 8시 (UTC 23:00)에 실행
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 기동 지원

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 파이썬 런타임 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 3. 파이썬 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 데이터 수집 및 Gemini 요약 json 생성
      - name: Fetch Market Data and Summarize
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      # 5. 변경된 data.json 파일을 레포지토리에 자동 커밋 및 푸시
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add public/data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update market data [skip ci]"
            git push origin main
            echo "Successfully updated and pushed new market data."
          else
            echo "No changes in market data. Skip commit."
          fi
